server:
  port: 8060

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: false

      routes:

        # ================= CUSTOMER =================
        - id: customer-service
          uri: lb://SPRINGCUSTOMER
          predicates:
            - Path=/customers/**

        # ================= AUTH =================
        - id: security-service
          uri: lb://SPRINGSECURITYSERVICE
          predicates:
            - Path=/auth/**

        # ================= PAYMENT =================
        - id: payment-service
          uri: lb://PAYMENTSERVICE
          predicates:
            - Path=/payments/**
          

        # ================= ORDER =================
        - id: order-service
          uri: lb://ORDERSERVICE
          predicates:
            - Path=/orders/**
          

        # ================= CART =================
        - id: cart-service
          uri: lb://CARTSERVICE
          predicates:
            - Path=/cart/**
          

        # ================= PRODUCT =================
        - id: product-service
          uri: lb://PRODUCTSERVICE
          predicates:
            - Path=/products/**
          
        # ================= VENDOR =================
        - id: vendor-service
          uri: lb://SPRINGVENDOR
          predicates:
            - Path=/vendors/**

        # ================= ADMIN =================
        - id: admin-service
          uri: lb://ADMINSERVICE
          predicates:
            - Path=/admin/**
        # ================= REVIEW =================
        - id: review-service
          uri: lb://REVIEWSERVICE
          predicates:
            - Path=/reviews/**
          

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://localhost:8061/eureka/